name: Build & Deploy Vietlott AI Predictor

on:
  push:
    branches: [main]

  # Run 2x/day to stay within GitHub Actions free tier (2000 min/month)
  # 2 runs × ~19min × 30 days = ~1,140 min/month
  schedule:
    - cron: '0 5 * * *'    # 12:00 VN - noon update
    - cron: '0 14 * * *'   # 21:00 VN - after major draws

  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flask flask-cors numpy pandas scikit-learn requests beautifulsoup4
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Collect data & train AI models
        run: python build.py

      - name: Setup Wrangler OAuth
        run: |
          mkdir -p "$HOME/.wrangler/config"
          cat > "$HOME/.wrangler/config/default.toml" <<EOF
          oauth_token = "expired"
          expiration_time = "2000-01-01T00:00:00.000Z"
          refresh_token = "${CF_REFRESH_TOKEN}"
          scopes = ["account:read", "user:read", "workers:write", "pages:write", "offline_access"]
          EOF
        env:
          CF_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy dist --project-name=vietlott-ai
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
